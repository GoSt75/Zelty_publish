name: Zelty Semainier

on:
  schedule:
    - cron: '0 5 * * *'   # tous les jours à 5h00 UTC (= 7h Paris été)
  workflow_dispatch:        # déclenchement manuel depuis GitHub

jobs:
  semainier:
    name: Activation / désactivation des plats
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openpyxl requests -q

      - name: Run semainier
        env:
          ZELTY_API_KEY: ${{ secrets.ZELTY_API_KEY }}
        run: python zelty_semainier.py --api-key "$ZELTY_API_KEY"

  publish-catalog:
    name: Publication du catalogue Plateforme
    runs-on: ubuntu-latest
    needs: semainier          # ne s'exécute que si semainier réussit
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install selenium -q

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Publish catalogue Plateforme
        env:
          ZELTY_LOGIN:    ${{ secrets.ZELTY_LOGIN }}
          ZELTY_PASSWORD: ${{ secrets.ZELTY_PASSWORD }}
        run: python zelty_publish_catalog.py
